<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Foundry Homes build animation</title>
<style>
  *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent!important;color-scheme:dark} body{min-height:100vh;display:grid;place-items:center;background:transparent!important} .stage{width:100%;height:100vh;display:grid;place-items:center;background:transparent!important} .preview{width:100%;display:grid;place-items:center;background:transparent!important}.scene{width:min(82vw,560px);max-height:72vh;display:grid;place-items:center;background:transparent!important}svg{width:100%;height:auto;display:block;overflow:hidden;background:transparent!important}  /* siding */
  .wht-f{fill:#ECEAE2} .wht-s{fill:#D7D3C9} .wht-p{fill:#C7C2B7}
  .lap line{stroke:#C4BFB2;stroke-width:.7;opacity:.55}
  .found{fill:#BDB7A8} .found-d{fill:#A39D8E}
  /* roof */
  .rf-front{fill:#3c3c39} .rf-rhip{fill:#313130} .rf-back{fill:#28282a} .rf-lhip{fill:#2c2c2a}
  .hipline line{stroke:#54534d;stroke-width:1.1;opacity:.85}
  .porch-ceil{fill:#9c9a93;opacity:.5}
  /* openings */
  .win{fill:#2b3338} .winframe{fill:none;stroke:#fff;stroke-width:1.6}
  .sheen{fill:url(#sheen);opacity:.5}
  .door{fill:#23252a} .doorwin{fill:#3a4147}
  .gdoor{fill:#E6E2D8} .gpanel line{stroke:#C7C2B5;stroke-width:.9;opacity:.7}
  .gwin{fill:#9fa6a3}
  /* concrete */
  .drive{fill:#CDC8BB} .drive-d{fill:#B0AB9D} .walk{fill:#CDC8BB}

  /* ---------- assembly ---------- */
  .part{opacity:0}
  @keyframes pour{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
  @keyframes rise{from{opacity:0;transform:translateY(34px)}to{opacity:1;transform:translateY(0)}}
  @keyframes drop{from{opacity:0;transform:translateY(-210px)}62%{opacity:1;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  @keyframes fade{to{opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .shadowG{animation:fade .6s ease forwards .25s}
  .slabG  {animation:pour .6s cubic-bezier(.3,1.2,.4,1) forwards .25s;transform-box:fill-box;transform-origin:center}
  .wallsG {animation:rise .6s cubic-bezier(.3,1,.4,1) forwards .85s}
  .roofG  {animation:drop .85s cubic-bezier(.4,1.2,.45,1) forwards 1.7s}
  .openG  {animation:pop .5s cubic-bezier(.3,1.35,.4,1) forwards 2.6s;transform-box:fill-box;transform-origin:center}
  .driveG {animation:pour .6s ease forwards 3.0s;transform-box:fill-box;transform-origin:center}
  @media (prefers-reduced-motion:reduce){ .part{opacity:1!important;animation:none!important;transform:none!important} }

</style>
</head>

<script>
  (function(){
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var firstBuildMs = reduce ? 250 : 3600;
    var cycle = 5200;
    function notifyComplete(){
      if (window.parent) {
        window.parent.postMessage({ type: 'foundry-preloader-complete' }, window.location.origin);
      }
    }
    function rebuild(){
      var wrap = document.getElementById('buildwrap');
      if (!wrap) return;
      wrap.replaceWith(wrap.cloneNode(true));
    }
    window.setTimeout(notifyComplete, firstBuildMs);
    if (!reduce) window.setInterval(rebuild, cycle);
  })();
</script>
